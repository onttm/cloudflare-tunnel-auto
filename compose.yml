# =============================================================================
# Works with any Docker Compose stack. Deployrr compatible.
# Repo   : https://github.com/onttm/cloudflare-tunnel-auto
# Bugs   : https://github.com/onttm/cloudflare-tunnel-auto/issues
# Source : https://github.com/cloudflare/cloudflared
# =============================================================================
#
# Fully API-automated Cloudflare Tunnel — no dashboard setup required.
#
# On first run, the init container:
#   1. Creates a locally-managed Cloudflare Tunnel via API
#   2. Adds wildcard DNS records (*.domain.com) for each DOMAINNAME_N
#   3. Writes cloudflared credentials and ingress config to a named volume
#
# On subsequent runs, it verifies the tunnel is still active, updates DNS
# records if domains changed, and regenerates the config.
#
# To add a new domain: add DOMAINNAME_N to .env, then:
#   docker compose up -d --force-recreate cloudflare-tunnel-auto-init cloudflare-tunnel-auto
#
# Prerequisites:
#   - cf_dns_api_token secret: Cloudflare Account API token with
#       Zone → DNS → Edit  +  Account → Cloudflare One Connectors → Edit
#   - DOMAINNAME_1 (and optionally DOMAINNAME_2, DOMAINNAME_3, ...) in .env
#   - A reverse proxy listening on localhost:443

services:

  # ── Init container — bootstraps tunnel, DNS, and config ─────────────────────
  cloudflare-tunnel-auto-init:
    image: ghcr.io/onttm/cloudflare-tunnel-init:latest
    container_name: cloudflare-tunnel-auto-init
    security_opt:
      - no-new-privileges:true
    restart: "no"
    network_mode: host
    environment:
      - CLOUDFLARE_TUNNEL_NAME=${CLOUDFLARE_TUNNEL_NAME:-homelab}
      - DOMAINNAME_1
      - DOMAINNAME_2
      - DOMAINNAME_3
      - DOMAINNAME_4
      - DOMAINNAME_5
      # Add DOMAINNAME_6, etc. for additional domains
    volumes:
      - cf_tunnel_auto_config:/etc/cloudflared
    secrets:
      - cf_dns_api_token
    # DOCKER-LABELS-PLACEHOLDER

  # ── Main tunnel service ──────────────────────────────────────────────────────
  cloudflare-tunnel-auto:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare-tunnel-auto
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    # profiles: ["core", "all"]  # Deployrr stack profiles — remove if running standalone
    network_mode: host
    depends_on:
      cloudflare-tunnel-auto-init:
        condition: service_completed_successfully
    command: ["tunnel", "--config", "/etc/cloudflared/config.yml", "run"]
    healthcheck:
      test: ["CMD", "cloudflared", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      - cf_tunnel_auto_config:/etc/cloudflared
    # DOCKER-LABELS-PLACEHOLDER

volumes:
  cf_tunnel_auto_config:

secrets:
  cf_dns_api_token:
    file: ./secrets/cf_dns_api_token
