# =============================================================================
# Community app for Deployrr
# Repo   : https://github.com/onttm/deployrr-cloudflare-tunnel
# Bugs   : https://github.com/onttm/deployrr-cloudflare-tunnel/issues
# Source : https://github.com/cloudflare/cloudflared
# =============================================================================
#
# On first run, the init container:
#   1. Creates a locally-managed Cloudflare Tunnel via API
#   2. Adds wildcard DNS records (*.domain.com) for each DOMAINNAME_N
#   3. Writes cloudflared credentials and ingress config to a named volume
#
# On subsequent runs, it verifies the tunnel is still active, updates DNS
# records if domains changed, and regenerates the config. No manual tunnel
# creation or DNS configuration required.
#
# To add a new domain: add DOMAINNAME_N to .env, then:
#   docker compose up -d --force-recreate cloudflare-tunnel-init cloudflare-tunnel
#
# Prerequisites:
#   - cf_dns_api_token secret must have: Zone:DNS:Edit + Cloudflare Tunnel:Edit
#   - DOMAINNAME_1 (and optionally DOMAINNAME_2, DOMAINNAME_3, ...) in .env
#   - Traefik running on localhost:443

services:

  # ── Init container — bootstraps tunnel, DNS, and config ─────────────────────
  cloudflare-tunnel-init:
    image: ghcr.io/onttm/cloudflare-tunnel-init:latest
    container_name: cloudflare-tunnel-init
    security_opt:
      - no-new-privileges:true
    restart: "no"
    network_mode: host
    environment:
      - CLOUDFLARE_TUNNEL_NAME=${CLOUDFLARE_TUNNEL_NAME:-homelab}
      - DOMAINNAME_1
      - DOMAINNAME_2
      - DOMAINNAME_3
      - DOMAINNAME_4
      - DOMAINNAME_5
      # Add DOMAINNAME_6, etc. for additional domains
    volumes:
      - cf_tunnel_config:/etc/cloudflared
    secrets:
      - cf_dns_api_token
    # DOCKER-LABELS-PLACEHOLDER

  # ── Main tunnel service ──────────────────────────────────────────────────────
  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare-tunnel
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    profiles: ["core", "all"]
    network_mode: host
    depends_on:
      cloudflare-tunnel-init:
        condition: service_completed_successfully
    command: ["tunnel", "--config", "/etc/cloudflared/config.yml", "run"]
    healthcheck:
      test: ["CMD", "cloudflared", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      - cf_tunnel_config:/etc/cloudflared
    # DOCKER-LABELS-PLACEHOLDER

volumes:
  cf_tunnel_config:
